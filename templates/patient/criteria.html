<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Критерии поиска</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .navbar { background: #2c3e50; color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .navbar h1 { font-size: 1.5rem; }
        .navbar a { color: white; text-decoration: none; margin-left: 1rem; }
        .navbar a:hover { text-decoration: underline; }
        .container { max-width: 800px; margin: 2rem auto; padding: 0 2rem; }
        .card { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2x 4px rgba(0,0,0,0.1); }
        .btn { background: #3498db; color: white; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn:hover { background: #2980b9; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🦷 Критерии поиска клиники</h1>
        <div>
            <a href="/patient/dashboard">Панель управления</a>
            <a href="/patient/scans">Мои снимки</a>
            <a href="/logout">Выход</a>
        </div>
    </div>
    <div class="container">
        <div class="card">
            <h2 style="margin-bottom: 1.5rem;">Настройте ваши предпочтения</h2>
            <form method="POST">
                <label>Город/Район</label>
                <input type="text" name="city" placeholder="Москва" value="Москва">
                
                <label>Ценовой сегмент</label>
                <select name="price_segment">
                    <option value="economy">Эконом</option>
                    <option value="business">Бизнес</option>
                    <option value="premium">Премиум</option>
                </select>
                
                <label>Желаемая дата начала</label>
                <input type="date" name="start_date">
                
                <label>
                    <input type="checkbox" name="installment" style="width: auto; margin-right: 0.5rem;">
                    Нужна рассрочка платежа
                </label>
                
                <button type="submit" class="btn" style="margin-top: 1rem;">Найти клиники</button>
            </form>
        </div>
    </div>
</body>
</html>
